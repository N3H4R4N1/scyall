plugin: amazon.aws.aws_ec2
regions:
  - us-east-1

filters:
  tag:Name: scylla-dev-server
  tag:Environment: dev
  tag:Role: scylla
  instance-state-name: running

keyed_groups:
  - key: tags.Role
    prefix: role
  - key: tags.Environment
    prefix: env

hostnames:
  - public-ip-address

compose:
  ansible_host: public_ip_address