[defaults]
inventory = ./aws_ec2.yml
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto
roles_path = ./roles
private_key_file = /var/lib/jenkins/keys/server2.pem
remote_user = ubuntu
timeout = 30
collections_path = /usr/share/ansible/collections:/usr/lib/python3/dist-packages/ansible_collections:~/.ansible/collections

[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml, amazon.aws.ec2